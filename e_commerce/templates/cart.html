{% extends 'base.html' %}

{% block title %}Shopping Cart - ShopSphere{% endblock %}

{% block content %}
<div class="container py-5">
    <!-- Page Header -->
    <div class="row mb-5">
        <div class="col-lg-12">
            <h1 class="display-5 fw-bold">
                <i class="fas fa-shopping-cart text-primary me-3"></i>Shopping Cart
            </h1>
            <p class="lead text-muted">Review and manage your items</p>
        </div>
    </div>

    <!-- Cart Items -->
    <div class="row">
        <div class="col-lg-12">
            <div class="alert alert-info text-center py-5">
                <i class="fas fa-shopping-cart fa-3x text-muted mb-3"></i>
                <p class="lead">Your cart is empty</p>
                <p class="text-muted">Start shopping to add items to your cart</p>
                <a href="{% url 'product' %}" class="btn btn-primary mt-3">
                    <i class="fas fa-shopping-bag me-2"></i>Continue Shopping
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
